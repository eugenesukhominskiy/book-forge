spring.application.name=book-forge

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/book-forge-db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Spring JPA
spring.jpa.generate-ddl=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.show_sql=false

# FlyWay
spring.flyway.enabled=true
spring.flyway.url=jdbc:postgresql://localhost:5432/book-forge-db
spring.flyway.user=postgres
spring.flyway.password=postgres
spring.flyway.locations=classpath:database/migration